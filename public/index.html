<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANG Editions Messenger - Clinical Triage Portal</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --urgent: #ef4444;
            --routine: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .container { display: none; width: 100%; height: 100%; }
        
        /* Login Wall Overlay */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .login-box h2 { margin-bottom: 6px; font-size: 1.5rem; color: #1e293b; }
        .login-box p { margin-bottom: 24px; font-size: 0.875rem; color: var(--text-muted); }
        .login-field { margin-bottom: 16px; }
        .login-field label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; color: #334155; }
        .login-field input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 10px; }
        .login-box button:hover { background: #1d4ed8; }
        .error-msg { color: var(--urgent); font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }

        /* Sidebar Panel (Triage Queue) */
        .sidebar { width: 350px; background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border-color); background: #fff; }
        .panel-header h2 { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .status-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; background: #e0f2fe; color: #0369a1; }
        
        .queue-list { flex: 1; overflow-y: auto; padding: 15px; }
        .triage-card { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .triage-card:hover { border-color: #cbd5e1; transform: translateY(-1px); }
        .triage-card .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .triage-card .name { font-weight: 600; font-size: 0.95rem; }
        .priority-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; color: #fff; }
        .priority-tag.urgent { background-color: var(--urgent); }
        .priority-tag.routine { background-color: var(--routine); }
        .triage-card .symptoms { font-size: 0.85rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Main Workspace Panel */
        .workspace { flex: 1; display: flex; flex-direction: column; background: var(--panel-bg); }
        
        /* Intake Simulator Section */
        .intake-simulator { padding: 20px; border-bottom: 1px solid var(--border-color); background: #f1f5f9; }
        .intake-form { display: flex; gap: 10px; }
        .intake-form input { flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; }
        .intake-form button { padding: 10px 20px; background: #0f172a; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* Active Chat Workspace */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); background: #fff; display: flex; align-items: center; justify-content: space-between; }
        .messages-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        
        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 0.92rem; line-height: 1.4; position: relative; }
        .msg-bubble.clinician { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-bubble.client { background: #e2e8f0; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-meta { font-size: 0.7rem; color: rgba(255,255,255,0.7); margin-top: 4px; text-align: right; }
        .msg-bubble.client .msg-meta { color: var(--text-muted); }

        .chat-input-bar { padding: 15px 20px; border-top: 1px solid var(--border-color); background: #fff; display: flex; gap: 10px; }
        .chat-input-bar input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; }
        .chat-input-bar button { padding: 12px 24px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<!-- Secure Gatekeeper Screen -->
<div class="login-overlay" id="loginWall">
    <div class="login-box">
        <h2>Clinical Authentication</h2>
        <p>Access restricted to authorized personnel.</p>
        <div class="login-field">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username">
        </div>
        <div class="login-field">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="handleLoginKeyPress(event)">
        </div>
        <button onclick="attemptLogin()">Authorize Node</button>
        <div class="error-msg" id="loginError">Access Denied: Invalid credentials</div>
    </div>
</div>

<div class="container" id="mainAppLayout">
    <!-- Triage Queue View -->
    <div class="sidebar">
        <div class="panel-header">
            <h2>Clinical Triage Queue</h2>
            <div id="connection-status" class="status-badge">Connecting...</div>
        </div>
        <div class="queue-list" id="queueList">
            <!-- Dynamic items populate here -->
        </div>
    </div>

    <!-- Live Workspace & Client Messenger -->
    <div class="workspace">
        <!-- Patient Intake Simulation Strip -->
        <div class="intake-simulator">
            <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px;">Simulation: Patient Intake Submission</h3>
            <div class="intake-form">
                <input type="text" id="intakeName" placeholder="Patient/Client Full Name">
                <input type="text" id="intakeSymptoms" placeholder="Symptoms (e.g., 'Chest pain' triggers urgent priority automatically)">
                <button onclick="simulateIntake()">Submit Triage</button>
            </div>
        </div>

        <!-- Chat Frame -->
        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <span style="font-weight: 700; font-size: 1.05rem;" id="activeChannelName">Secure Messaging Room</span>
                    <span style="font-size: 0.75rem; color: #10b981; margin-left: 8px; font-weight: 600;">● End-to-End Encrypted (AES-256-GCM)</span>
                </div>
            </div>

            <div class="messages-log" id="msgLog">
                <!-- Live chat messages populate here -->
            </div>

            <div class="chat-input-bar">
                <input type="text" id="chatInput" placeholder="Type a message to your client..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send Securely</button>
            </div>
        </div>
    </div>
</div>

<script>
    let ws;
    const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const wsUrl = wsProtocol + window.location.host;

    // Trigger on login button click
    async function attemptLogin() {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        const errEl = document.getElementById('loginError');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();

            if (data.success) {
                // Hide login wall and reveal app workspace
                document.getElementById('loginWall').style.display = 'none';
                document.getElementById('mainAppLayout').style.display = 'flex';
                // Fire up secure operational channel
                connectWebSocket();
            } else {
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.innerText = "Network Error connecting to server.";
            errEl.style.display = 'block';
        }
    }

    function handleLoginKeyPress(e) {
        if (e.key === 'Enter') attemptLogin();
    }

    function connectWebSocket() {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById('connection-status').innerText = 'System Live';
            document.getElementById('connection-status').style.background = '#e6f4ea';
            document.getElementById('connection-status').style.color = '#137333';
        };

        ws.onclose = () => {
            document.getElementById('connection-status').innerText = 'Offline - Reconnecting';
            document.getElementById('connection-status').style.background = '#fce8e6';
            document.getElementById('connection-status').style.color = '#c5221f';
            setTimeout(connectWebSocket, 3000);
        };

        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);

            if (payload.type === 'INITIAL_TRIAGE_LOAD') {
                document.getElementById('queueList').innerHTML = '';
                payload.data.forEach(item => appendTriageCard(item));
            }
            
            if (payload.type === 'INITIAL_CHAT_LOAD') {
                document.getElementById('msgLog').innerHTML = '';
                payload.data.forEach(msg => appendMessageBubble(msg));
            }

            if (payload.type === 'NEW_TRIAGE_ADDED') {
                appendTriageCard(payload.data);
            }

            if (payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessageBubble(payload.data);
            }
        };
    }

    function appendTriageCard(data) {
        const queueList = document.getElementById('queueList');
        const card = document.createElement('div');
        card.className = 'triage-card';
        card.onclick = () => {
            document.getElementById('activeChannelName').innerText = `Chat with: ${data.patient_name}`;
        };

        const isUrgent = data.priority === 'URGENT';
        
        card.innerHTML = `
            <div class="meta">
                <span class="name">${data.patient_name}</span>
                <span class="priority-tag ${isUrgent ? 'urgent' : 'routine'}">${data.priority}</span>
            </div>
            <div class="symptoms">${data.symptoms}</div>
        `;
        queueList.insertBefore(card, queueList.firstChild);
    }

    function appendMessageBubble(data) {
        const log = document.getElementById('msgLog');
        const bubble = document.createElement('div');
        
        const isClinician = data.sender === 'Clinician';
        bubble.className = `msg-bubble ${isClinician ? 'clinician' : 'client'}`;
        
        const timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        bubble.innerHTML = `
            <strong>${data.sender}:</strong> ${data.text}
            <div class="msg-meta">${timeStr}</div>
        `;
        
        log.appendChild(bubble);
        log.scrollTop = log.scrollHeight;
    }

    function simulateIntake() {
        const nameEl = document.getElementById('intakeName');
        const symptomsEl = document.getElementById('intakeSymptoms');
        
        if (!nameEl.value || !symptomsEl.value) return;

        ws.send(JSON.stringify({
            type: 'NEW_TRIAGE',
            name: nameEl.value,
            symptoms: symptomsEl.value
        }));

        nameEl.value = '';
        symptomsEl.value = '';
    }

    // Fixed path scoping inside client send functionality
    function sendMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value) return;

        ws.send(JSON.stringify({
            type: 'CHAT_MESSAGE',
            sender: 'Clinician',
            text: input.value
        }));

        input.value = '';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
